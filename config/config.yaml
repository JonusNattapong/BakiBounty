# ============================================================
# BakiBounty Configuration
# ============================================================
# Copy to config.yaml and modify as needed.
# CLI flag: --config path/to/config.yaml

# --- General ---
general:
  threads: 20
  rate_limit: 150        # requests per second
  timeout: 30            # seconds per tool execution
  retry: 2               # retries on failure
  verbose: false

# --- Proxy ---
# Route traffic through proxy for anonymity
proxy:
  enabled: false
  http: null             # e.g. "http://127.0.0.1:8080"
  https: null            # e.g. "http://127.0.0.1:8080"
  socks5: null           # e.g. "socks5://127.0.0.1:1080"

# --- Resume ---
# Auto-save scan state for resume on crash
resume:
  enabled: true
  state_file: .run_state.json

# --- Tool Paths ---
# Set to null to auto-detect from PATH
tools:
  subfinder: null
  amass: null
  httpx: null
  nuclei: null
  katana: null
  ffuf: null
  naabu: null

# --- Recon ---
recon:
  sources:
    - subfinder
    # - amass
  subfinder:
    all_sources: true
    recursive: true
  amass:
    mode: enum          # enum | intel

# --- Probing ---
probing:
  httpx:
    status_code: true
    tech_detect: true
    content_length: true
    title: true
    favicon: true
    response_time: true
    follow_redirects: true

# --- Discovery ---
discovery:
  katana:
    depth: 3
    js_crawl: true
    field_scope: rdn
    strategy: breadth-first

# --- Scanning ---
scanning:
  nuclei:
    severity:
      - critical
      - high
      - medium
    templates_dir: null          # null = use nuclei default
    custom_templates_dir: templates/
    concurrency: 25
    rate_limit: 150
    headless: false
  ffuf:
    wordlist: /usr/share/seclists/Discovery/Web-Content/common.txt
    extensions:
      - .php
      - .asp
      - .aspx
      - .jsp
      - .html
    match_codes:
      - 200
      - 204
      - 301
      - 302
      - 307
      - 401
      - 403
      - 405
      - 500
    threads: 40
    recursion_depth: 2

# --- Output ---
output:
  dir: output/
  formats:
    - json
    - markdown
    # - html
  compress: false

# --- Notifications ---
notifications:
  enabled: false
  telegram:
    bot_token: null
    chat_id: null
  discord:
    webhook_url: null
  on:
    - critical
    - high

# --- AI Analysis ---
# Free providers: minimax (M2.5), kilo (Grok Code Fast 1), groq (Llama 3.1), together
ai:
  enabled: true
  provider: minimax          # minimax | kilo | groq | together | deepseek | openai | anthropic
  api_key: null              # or set BAKIBOUNTY_AI_KEY env var
  base_url: null             # auto-set per provider
  model: MiniMax-M2.5        # MiniMax M2.5 (free) | grok-code-fast-1 | llama-3.1-70b
  analyze_findings: true
  analyze_severity:
    - critical
    - high
  max_tokens: 1024
  temperature: 0.3
